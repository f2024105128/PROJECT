{% extends 'base.html' %}

{% block content %}

<div class="cart">

    <h2>Your Shopping Cart</h2>

    <br>

    {% for item in items %}

    <div class="cart-item">

        <h3>{{ item.product.name }}</h3>

        <p>Price: ${{ item.product.price }}</p>

        <p>Quantity: {{ item.quantity }}</p>

    </div>

    {% endfor %}

    <div class="checkout">
        <a href="/checkout" class="btn">
            Proceed To Checkout
        </a>
    </div>

</div>

{% endblock %}
